openapi: 3.0.3
info:
  title: Pet Information System Mobile API
  description: |
    Full clinic mobile REST API (Laravel + Sanctum).

    **Synced with:** `routes/api.php` and `docs/MOBILE_API.md`

    **Authentication:** `POST /auth/login` or `/auth/register`, then `Authorization: Bearer {token}`.

    **Default success shape:** `{ "message": string, "data": object|null }`

    **Exceptions:** `POST /nearby-places/geocode` and `POST /nearby-places/search` return JSON directly (no `message`/`data` wrapper on success).

    **Customer mobile:** See MOBILE_API.md "Customer mobile endpoints" section for the subset of routes customers use.

    **Web-only features** (not in this API): appointment rating, pet toggle-active, grooming slot check, billing checkout from appointments, reports export, customer appointment clinic_id.
  version: 1.0.0
  contact:
    name: Pet Information System

servers:
  - url: http://127.0.0.1:8000/api/v1
    description: Local development
  - url: "{baseUrl}/api/v1"
    description: Production
    variables:
      baseUrl:
        default: https://your-domain.com

tags:
  - name: Authentication
  - name: Dashboard
  - name: Clients
  - name: Pets
  - name: Health Records
  - name: Appointments
  - name: Medicines
  - name: Vaccinations
  - name: Grooming
  - name: Billing
  - name: Pet Shop
  - name: Pet Shop Billing
  - name: Service Catalog
  - name: Notifications
  - name: Reports
  - name: Admin Users
  - name: Nearby Places
  - name: Profile

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    SuccessResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        data:
          nullable: true

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        role:
          type: string
          enum: [super_admin, veterinarian, receptionist, groomer, customer, cashier, clinic_owner]
          description: clinic_owner is primarily web; most mobile endpoints return 403
        client_id: { type: integer, nullable: true }
        email_verified_at: { type: string, format: date-time, nullable: true }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
        - password_confirmation
        - address_line1
        - barangay
        - city
        - province
        - latitude
        - longitude
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password }
        password_confirmation: { type: string, format: password }
        address_line1: { type: string, maxLength: 255 }
        address_line2: { type: string, maxLength: 255, nullable: true }
        barangay: { type: string, maxLength: 255 }
        city: { type: string, maxLength: 255 }
        province: { type: string, maxLength: 255 }
        postal_code: { type: string, maxLength: 20, nullable: true }
        country: { type: string, maxLength: 100, nullable: true }
        address: { type: string, maxLength: 500, nullable: true }
        address_formatted: { type: string, maxLength: 500, nullable: true }
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }
        geoapify_place_id: { type: string, maxLength: 255, nullable: true }
        geoapify_label: { type: string, maxLength: 500, nullable: true }
      description: |
        Creates a customer account and linked clients record.
        contact is set server-side (N/A), unlike web registration.

    AuthData:
      type: object
      properties:
        token: { type: string }
        token_type: { type: string, example: Bearer }
        user:
          $ref: "#/components/schemas/User"

    ClientInput:
      type: object
      required: [name, contact]
      properties:
        name: { type: string }
        contact: { type: string }
        email: { type: string, format: email, nullable: true }
        address: { type: string, nullable: true }

    PetInput:
      type: object
      required: [pet_name, species]
      properties:
        client_id: { type: integer }
        pet_name: { type: string }
        species: { type: string }
        breed: { type: string }
        age: { type: integer }
        gender: { type: string }
        birth_date: { type: string, format: date }
        weight: { type: number }
        color: { type: string }
        microchip_no: { type: string }
        vaccination_status:
          type: string
          enum: [up_to_date, partial, not_vaccinated, unknown]
        medical_history: { type: string }
        photo: { type: string, format: binary }

    AppointmentInput:
      type: object
      required: [pet_id, scheduled_at, type, status]
      properties:
        pet_id: { type: integer }
        client_id:
          type: integer
          description: Required for staff; optional for customers (auto-set from logged-in user)
        scheduled_at: { type: string, format: date-time }
        type:
          type: string
          enum: [checkup, vaccination, grooming, consultation, surgery, boarding, emergency_care, other]
        status:
          type: string
          enum: [scheduled, completed, cancelled]
          description: Customers should send scheduled on create (server overrides). Updates force cancelled for customers.
        notes: { type: string, nullable: true }

    MedicineInput:
      type: object
      required: [name, category, quantity, unit, unit_price, expiry_date, reorder_level]
      properties:
        name: { type: string }
        category:
          type: string
          enum: [medicine, vaccine, supplement_vitamin, consumable_supply, parasite_control, grooming_hygiene, pet_food]
        description: { type: string }
        quantity: { type: integer, minimum: 0 }
        unit: { type: string }
        unit_price: { type: number, minimum: 0 }
        expiry_date: { type: string, format: date }
        reorder_level: { type: integer, minimum: 0 }

    PaymentInput:
      type: object
      required: [amount, method, paid_at]
      properties:
        amount: { type: number, minimum: 0.01 }
        method:
          type: string
          enum: [cash, card, gcash, maya, bank_transfer]
        paid_at: { type: string, format: date }
        reference_number: { type: string, nullable: true }
        notes: { type: string, nullable: true }

    PetShopCheckout:
      type: object
      required: [client_id, items]
      properties:
        client_id: { type: integer }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [medicine_id, quantity]
            properties:
              medicine_id: { type: integer }
              quantity: { type: integer, minimum: 1 }
        notes: { type: string, maxLength: 1000 }

    ProfileUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }

    PasswordUpdate:
      type: object
      required: [current_password, password, password_confirmation]
      properties:
        current_password: { type: string }
        password: { type: string, format: password }
        password_confirmation: { type: string, format: password }

    AccountDelete:
      type: object
      required: [password]
      properties:
        password: { type: string }

    GeocodeRequest:
      type: object
      required: [place]
      properties:
        place: { type: string, minLength: 2, maxLength: 255 }

    GeocodeResponse:
      type: object
      properties:
        lat: { type: number }
        lng: { type: number }
        label: { type: string }

    NearbySearchRequest:
      type: object
      required: [lat, lng]
      properties:
        lat: { type: number, minimum: -90, maximum: 90 }
        lng: { type: number, minimum: -180, maximum: 180 }
        type:
          type: string
          enum: [all, vet, petshop, grooming]
          default: all
        radius:
          type: integer
          minimum: 500
          maximum: 20000
          default: 5000

    NearbyPlace:
      type: object
      properties:
        name: { type: string }
        address: { type: string }
        distance_m: { type: integer }
        phone: { type: string, nullable: true }
        website: { type: string, nullable: true }
        lat: { type: number }
        lng: { type: number }

  responses:
    Success:
      description: Success
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessResponse"
    Created:
      description: Created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessResponse"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string, example: Unauthenticated. }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: You do not have permission to access this resource.

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register customer account
      description: |
        Creates role=customer user and linked clients record.
        Requires address fields and coordinates. contact is set server-side (N/A).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login and receive Bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthData"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/user:
    get:
      tags: [Authentication]
      security: [{ bearerAuth: [] }]
      summary: Get current user
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Authentication]
      security: [{ bearerAuth: [] }]
      summary: Revoke current token
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard:
    get:
      tags: [Dashboard]
      security: [{ bearerAuth: [] }]
      summary: Dashboard stats and alerts
      description: |
        All authenticated roles.
        Customer data includes stats, upcoming_appointments, due_health_records,
        appointments_section_title, can_manage_appointment_status (false), and empty medicine alert arrays.
        Staff data includes expired_medicines, critical_medicines, expiring_soon, and can_manage_appointment_status.
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /clients:
    get:
      tags: [Clients]
      security: [{ bearerAuth: [] }]
      summary: List clients
      description: "Roles: super_admin, receptionist"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Clients]
      security: [{ bearerAuth: [] }]
      summary: Create client
      description: "Roles: super_admin, receptionist"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /clients/{client}:
    put:
      tags: [Clients]
      security: [{ bearerAuth: [] }]
      summary: Update client
      description: "Roles: super_admin, receptionist"
      parameters:
        - name: client
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not found
    delete:
      tags: [Clients]
      security: [{ bearerAuth: [] }]
      summary: Delete client
      description: "Roles: super_admin, receptionist"
      parameters:
        - name: client
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not found

  /pets:
    get:
      tags: [Pets]
      security: [{ bearerAuth: [] }]
      summary: List pets
      description: |
        Roles: super_admin, veterinarian, receptionist, customer, cashier.
        Response data includes pets, clients, can_manage_records.
        Customers are scoped to their linked client_id.
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Pets]
      security: [{ bearerAuth: [] }]
      summary: Create pet
      description: "Roles: super_admin, veterinarian, receptionist, customer"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PetInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /pets/{pet}:
    get:
      tags: [Pets]
      security: [{ bearerAuth: [] }]
      summary: Show pet with relations
      description: "Roles: super_admin, veterinarian, receptionist, customer, cashier"
      parameters:
        - name: pet
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not found
    put:
      tags: [Pets]
      security: [{ bearerAuth: [] }]
      summary: Update pet (JSON or multipart)
      description: "Roles: super_admin, veterinarian, receptionist, customer"
      parameters:
        - name: pet
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PetInput"
          application/json:
            schema:
              $ref: "#/components/schemas/PetInput"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not found
    post:
      tags: [Pets]
      security: [{ bearerAuth: [] }]
      summary: Update pet (multipart photo upload)
      description: Same as PUT; use POST when uploading photo from mobile.
      parameters:
        - name: pet
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PetInput"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Pets]
      security: [{ bearerAuth: [] }]
      summary: Delete pet
      description: "Roles: super_admin, veterinarian, receptionist, customer"
      parameters:
        - name: pet
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not found

  /pets/{pet}/client-record:
    get:
      tags: [Pets]
      security: [{ bearerAuth: [] }]
      summary: Customer-facing pet record view
      description: "Roles: super_admin, veterinarian, receptionist, customer, cashier"
      parameters:
        - name: pet
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not found

  /pets/{pet}/health-records:
    post:
      tags: [Health Records]
      security: [{ bearerAuth: [] }]
      summary: Add health record
      description: "Roles: super_admin, veterinarian, receptionist"
      parameters:
        - name: pet
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type, title, record_date]
              properties:
                type:
                  type: string
                  enum: [consultation, vaccination, grooming, medication, surgery, boarding, emergency_care]
                title: { type: string }
                description: { type: string }
                medicine_id: { type: integer }
                medication_quantity: { type: integer }
                medication_lines: { type: array, items: { type: object } }
                record_date: { type: string, format: date }
                next_due_date: { type: string, format: date }
                unit_price: { type: number }
                quantity: { type: integer }
                veterinarian_notes: { type: string }
                sticker_photo: { type: string, format: binary }
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /pets/{pet}/health-records/{healthRecord}:
    put:
      tags: [Health Records]
      security: [{ bearerAuth: [] }]
      summary: Update health record
      description: "Roles: super_admin, veterinarian, receptionist"
      parameters:
        - name: pet
          in: path
          required: true
          schema: { type: integer }
        - name: healthRecord
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                type: { type: string }
                title: { type: string }
                record_date: { type: string, format: date }
                sticker_photo: { type: string, format: binary }
                remove_sticker_photo: { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          description: Not found
    post:
      tags: [Health Records]
      security: [{ bearerAuth: [] }]
      summary: Update health record (multipart)
      description: Same as PUT; preferred for sticker photo uploads.
      parameters:
        - name: pet
          in: path
          required: true
          schema: { type: integer }
        - name: healthRecord
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Health Records]
      security: [{ bearerAuth: [] }]
      summary: Delete health record
      parameters:
        - name: pet
          in: path
          required: true
          schema: { type: integer }
        - name: healthRecord
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          description: Not found

  /pets/{pet}/health-records/{healthRecord}/sticker:
    delete:
      tags: [Health Records]
      security: [{ bearerAuth: [] }]
      summary: Remove vaccine sticker photo
      parameters:
        - name: pet
          in: path
          required: true
          schema: { type: integer }
        - name: healthRecord
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          description: Not found

  /appointments:
    get:
      tags: [Appointments]
      security: [{ bearerAuth: [] }]
      summary: List appointments
      description: |
        Roles: super_admin, veterinarian, receptionist, cashier, customer.
        Response data includes appointments, pets, clients, can_manage_status, service_types.
        Customers own data only; create forces scheduled; update forces cancelled.
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Appointments]
      security: [{ bearerAuth: [] }]
      summary: Schedule appointment
      description: |
        Customers should send status=scheduled (server overrides). client_id optional for customers.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "422":
          $ref: "#/components/responses/ValidationError"

  /appointments/{appointment}:
    put:
      tags: [Appointments]
      security: [{ bearerAuth: [] }]
      summary: Update appointment
      description: Customers force status to cancelled on update.
      parameters:
        - name: appointment
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          description: Not found
    delete:
      tags: [Appointments]
      security: [{ bearerAuth: [] }]
      summary: Cancel appointment
      parameters:
        - name: appointment
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          description: Not found

  /medicines:
    get:
      tags: [Medicines]
      security: [{ bearerAuth: [] }]
      summary: List inventory
      description: "Roles: super_admin, veterinarian, receptionist"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Medicines]
      security: [{ bearerAuth: [] }]
      summary: Add medicine
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicineInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "422":
          $ref: "#/components/responses/ValidationError"

  /medicines/{medicine}:
    put:
      tags: [Medicines]
      security: [{ bearerAuth: [] }]
      summary: Update medicine
      parameters:
        - name: medicine
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicineInput"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          description: Not found
    delete:
      tags: [Medicines]
      security: [{ bearerAuth: [] }]
      summary: Delete medicine
      parameters:
        - name: medicine
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          description: Not found

  /vaccinations:
    get:
      tags: [Vaccinations]
      security: [{ bearerAuth: [] }]
      summary: List vaccinations and metadata
      description: "Roles: super_admin, veterinarian, receptionist, cashier"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [Vaccinations]
      security: [{ bearerAuth: [] }]
      summary: Record vaccination
      description: "Roles: super_admin, veterinarian, receptionist"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "422":
          $ref: "#/components/responses/ValidationError"

  /vaccinations/{vaccination}:
    put:
      tags: [Vaccinations]
      security: [{ bearerAuth: [] }]
      summary: Update vaccination
      parameters:
        - name: vaccination
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          description: Not found
    delete:
